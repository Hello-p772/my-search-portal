<script>
    const resultsDiv = document.getElementById('results');

    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = document.getElementById('query').value;
        resultsDiv.innerHTML = "<p style='text-align:center;'>Searching...</p>";

        try {
            // We go DIRECTLY to the function path to avoid redirect rules
            const response = await fetch('/.netlify/functions/search?q=' + encodeURIComponent(query));
            
            if (!response.ok) throw new Error("Server error: " + response.status);
            
            const html = await response.text();
            resultsDiv.innerHTML = html;

            // Re-attach the Wikipedia internal view logic
            document.querySelectorAll('.wiki-link').forEach(link => {
                link.addEventListener('click', async (event) => {
                    event.preventDefault();
                    const pageId = link.getAttribute('data-id');
                    resultsDiv.innerHTML = "<p style='text-align:center;'>Loading full article...</p>";
                    
                    const fullRes = await fetch(`https://en.wikipedia.org/w/api.php?action=parse&format=json&pageid=${pageId}&prop=text&origin=*`);
                    const fullData = await fullRes.json();
                    
                    resultsDiv.innerHTML = `
                        <button onclick="location.reload()" style="margin-bottom:15px; padding:8px 15px; cursor:pointer;">← Back to Search</button>
                        <div style="font-family:sans-serif; line-height:1.6;">${fullData.parse.text['*']}</div>
                    `;
                });
            });
        } catch (err) {
            resultsDiv.innerHTML = "<p style='color:red;'>Error: " + err.message + "</p>";
        }
    });
</script>
