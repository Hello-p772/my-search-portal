<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .search-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        input[type="text"] {
            width: 70%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #007bff; }
        button {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #results { 
            margin-top: 20px; 
            width: 100%; 
            text-align: left; 
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }
    </style>
</head>
<body>

<div class="search-container">
    <h1>Search Portal</h1>
    <form id="searchForm">
        <input type="text" id="query" placeholder="What are you looking for?" required>
        <button type="submit">Search</button>
    </form>
    <div id="results"></div>
</div>

<script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        
        resultsDiv.innerHTML = "<p>Loading results from Google...</p>";

        try {
            // This talks to your Netlify function
            const response = await fetch('/.netlify/functions/search?q=' + encodeURIComponent(query));
            
            if (!response.ok) throw new Error("Search failed on the server.");
            
            const html = await response.text();
            
            // Create a safe window to show the Google HTML
            resultsDiv.innerHTML = ""; 
            const iframe = document.createElement('iframe');
            resultsDiv.appendChild(iframe);
            
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
            
        } catch (err) {
            resultsDiv.innerHTML = "<p style='color:red;'>Error: " + err.message + "</p>";
        }
    });
</script>

</body>
</html>
