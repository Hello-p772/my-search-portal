<script>
    const resultsDiv = document.getElementById('results');

    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = document.getElementById('query').value;
        resultsDiv.innerHTML = "<p style='text-align:center;'>Searching Wikipedia...</p>";

        try {
            const response = await fetch('/api/search?q=' + encodeURIComponent(query));
            const html = await response.text();
            resultsDiv.innerHTML = html;

            // Add "Full View" logic to all the new links
            document.querySelectorAll('.wiki-link').forEach(link => {
                link.addEventListener('click', async (event) => {
                    event.preventDefault();
                    const pageId = link.getAttribute('data-id');
                    resultsDiv.innerHTML = "<p style='text-align:center;'>Loading full article...</p>";
                    
                    // Fetch the full content for that specific page
                    const fullRes = await fetch(`https://en.wikipedia.org/w/api.php?action=parse&format=json&pageid=${pageId}&prop=text&origin=*`);
                    const fullData = await fullRes.json();
                    
                    resultsDiv.innerHTML = `
                        <button onclick="location.reload()" style="margin-bottom:10px; padding:5px 10px; background:#666;">← Back to Search</button>
                        <div class="full-article">${fullData.parse.text['*']}</div>
                    `;
                });
            });
        } catch (err) {
            resultsDiv.innerHTML = "Error loading results.";
        }
    });
</script>
